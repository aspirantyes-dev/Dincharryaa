<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dincharryaa | Premium Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, updateDoc, where, getDocs, addDoc, serverTimestamp, arrayUnion, arrayRemove } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP6rz3z9UahkhQm-wS7CO-QsGNT2QMUbQ",
            authDomain: "dincharryaa.firebaseapp.com",
            projectId: "dincharryaa",
            storageBucket: "dincharryaa.firebasestorage.app",
            messagingSenderId: "967791343919",
            appId: "1:967791343919:web:f795208c273df031c849da",
            measurementId: "G-T67T0VNSGC"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fb = { doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, updateDoc, where, getDocs, addDoc, serverTimestamp, arrayUnion, arrayRemove, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut };

        window.playSFX = (type) => {
            const sounds = { click: 'https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3', success: 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3', modal: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3' };
            const audio = new Audio(sounds[type]);
            audio.volume = 0.42;
            audio.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate([12, 6, 12]);
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@800&display=swap');
        
        :root { 
            --bg: #050507; 
            --gold: #e2b871; 
            --gold-dim: rgba(226, 184, 113, 0.18);
            --gold-glow: rgba(226, 184, 113, 0.75);
            --text-main: #ffffff;
            --text-muted: #73778a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, rgba(30, 30, 40, 0.8) 0%, transparent 78%), url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.065"/%3E%3C/svg%3E');
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; justify-content: center; overflow-x: hidden; 
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 50%, rgba(0,0,0,0.18) 50%);
            background-size: 100% 8px;
            pointer-events: none;
            animation: scan 10s linear infinite;
            opacity: 0.2;
            z-index: 1;
            mix-blend-mode: overlay;
        }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

        #root { width: 100%; max-width: 500px; transition: max-width 0.5s cubic-bezier(0.23, 1, 0.32, 1); position: relative; z-index: 2; }
        .container { width: 92%; margin: 0 auto; padding: 30px 0 170px 0; display: flex; flex-direction: column; }

        .glass { 
            width: 100%; 
            background: linear-gradient(145deg, rgba(35, 35, 45, 0.6) 0%, rgba(15, 15, 20, 0.8) 100%);
            border-top: 1px solid rgba(255,255,255,0.28);
            border-left: 1px solid rgba(255,255,255,0.15);
            border-right: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            border-radius: 38px; 
            padding: 32px; 
            margin-bottom: 26px; 
            box-shadow: 0 55px 110px -35px rgba(0,0,0,0.99), inset 0 3px 0 rgba(255,255,255,0.2), 0 0 0 1px rgba(226,184,113,0.15);
            backdrop-filter: blur(55px);
            -webkit-backdrop-filter: blur(55px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, backdrop-filter; /* Hardware acceleration */
        }
        
        .brand-header h1 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 700;
            line-height: 1; 
            background: linear-gradient(90deg, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 70px var(--gold-glow);
            will-change: opacity, transform;
        }

        .nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(65px); border-radius: 46px; display: flex; justify-content: space-around; padding: 20px 16px; z-index: 1000; box-shadow: 0 45px 90px -25px rgba(0,0,0,0.99); will-change: transform, backdrop-filter; }

        .nav-btn { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); cursor: pointer; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0.75; will-change: transform, opacity, filter; }
        .nav-btn.active { color: var(--gold); opacity: 1; transform: translateY(-9px) scale(1.15); filter: drop-shadow(0 0 28px var(--gold-glow)); }

        .btn-prime { background: var(--text-main); color: var(--bg); border: none; padding: 22px; border-radius: 28px; width: 100%; font-weight: 800; cursor: pointer; font-size: 14.8px; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); letter-spacing: 2.2px; text-transform: uppercase; box-shadow: 0 20px 40px rgba(255,255,255,0.2); will-change: transform, box-shadow; }
        .btn-prime:active { transform: scale(0.96); }
        .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, #d4a46a 100%); color: #111; box-shadow: 0 20px 45px var(--gold-glow); }

        input, textarea, select { background: rgba(0,0,0,0.78); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 22px; border-radius: 28px; width: 100%; margin-bottom: 18px; font-size: 16.5px; outline: none; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: inset 0 5px 20px rgba(0,0,0,0.8); }
        input:focus, textarea:focus, select:focus { border-color: var(--gold); box-shadow: inset 0 5px 20px rgba(0,0,0,0.8), 0 0 35px var(--gold-glow); }

        .xp-bar { width: 100%; height: 12px; background: rgba(0,0,0,0.92); border-radius: 9999px; margin: 24px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); box-shadow: inset 0 5px 14px rgba(0,0,0,0.85); transform: translateZ(0); }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #b8860b, var(--gold), #fff); box-shadow: 0 0 45px var(--gold); transition: width 2.4s cubic-bezier(0.23, 1, 0.32, 1); will-change: width; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-bottom: 38px; }
        .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); padding: 30px 18px; border-radius: 32px; text-align: center; transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); will-change: transform; }
        .stat-card:hover { transform: translateY(-12px) scale(1.04); }

        .stat-val { font-family: 'Playfair Display'; font-size: 36px; display: block; margin-bottom: 8px; font-weight: 700; letter-spacing: -2px; }
        .stat-lbl { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; }

        .animate { animation: slideFade 0.85s cubic-bezier(0.23, 1, 0.32, 1) forwards; will-change: transform, opacity; }
        @keyframes slideFade { from { opacity: 0; transform: scale(0.9) translateY(32px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .rank-pulse { animation: pulse 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 60px var(--gold-glow)); will-change: transform, filter; }
        @keyframes pulse { 0%, 100% { transform: scale(0.94); } 50% { transform: scale(1.12); } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(45px); }
        .modal-content { position: relative; width: 100%; max-width: 480px; will-change: transform, opacity; }

        .motivational-orb { background: linear-gradient(135deg, #1a1a22, #2a1f35); border: 5px solid var(--gold); border-radius: 50%; padding: 26px 34px; box-shadow: 0 0 70px var(--gold-glow); text-align: center; font-style: italic; font-size: 16.5px; color: #e2e8f0; margin-bottom: 26px; position: relative; }
        .streak-flame { animation: flame 1.4s infinite alternate ease-in-out; display: inline-block; will-change: transform; }
        @keyframes flame { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 9px; width: 100%; }
        .day-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-align: center; margin-bottom: 9px; }
        .day-node { aspect-ratio: 1; background: rgba(0,0,0,0.7); border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text-muted); font-weight: 700; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); will-change: background, border, box-shadow, color; }
        .day-node.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 28px var(--gold-glow), inset 0 0 18px rgba(226,184,113,0.4); }
        .day-node.dim { opacity: 0; border: none; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        
        const BADGES = [
            { name: "Iron", min: 0, icon: "🌑", color: "#94a3b8" },
            { name: "Bronze", min: 500, icon: "🥉", color: "#cd7f32" },
            { name: "Silver", min: 1500, icon: "🥈", color: "#e2e8f0" },
            { name: "Gold", min: 4000, icon: "👑", color: "#e2b871" },
            { name: "Immortal", min: 10000, icon: "🧿", color: "#a855f7" }
        ];

        const MOTIVATIONAL_QUOTES = [
            "The protocol is the path. Discipline is the key.",
            "Every day you show up, the empire grows stronger.",
            "Small wins compound into legendary status.",
            "You are not grinding. You are forging destiny."
        ];

        const THEMES = {
            classic: "#e2b871",
            goldrush: "#f5c76a",
            neon: "#00ffcc",
            cyber: "#ff00aa",
            voidelite: "#9f7cff"
        };

        const PremiumLogo = ({ size = 64 }) => (
            <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{filter: 'drop-shadow(0px 0px 20px rgba(226, 184, 113, 0.5))'}}>
                <path d="M25 15V85H50C69.33 85 85 69.33 85 50C85 30.67 69.33 15 50 15H25Z" stroke="url(#paint0_linear)" strokeWidth="6" strokeLinejoin="round"/>
                <path d="M35 28V72H50C62.15 72 72 62.15 72 50C72 37.85 62.15 28 50 28H35Z" stroke="url(#paint0_linear)" strokeWidth="3" strokeLinejoin="round"/>
                <defs>
                    <linearGradient id="paint0_linear" x1="25" y1="15" x2="85" y2="85" gradientUnits="userSpaceOnUse">
                        <stop stopColor="#FFF" />
                        <stop offset="0.5" stopColor="var(--gold)" />
                        <stop offset="1" stopColor="#B8860B" />
                    </linearGradient>
                </defs>
            </svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [data, setData] = useState(null);
            const [tab, setTab] = useState("grind");
            const [confirm, setConfirm] = useState(null);
            const [viewVault, setViewVault] = useState(false);
            const [inspectedUser, setInspectedUser] = useState(null);
            const [posts, setPosts] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [squad, setSquad] = useState(null);
            const [thought, setThought] = useState("");
            const [viewMode, setViewMode] = useState("month");
            const [authTab, setAuthTab] = useState("signin");
            const [currentTheme, setCurrentTheme] = useState("classic");

            const play = useCallback((type) => window.playSFX(type), []);

            useEffect(() => {
                const unsub = window.fb.onAuthStateChanged(window.auth, (u) => {
                    if (u) {
                        setUser(u);
                        window.fb.onSnapshot(window.fb.doc(window.db, "users", u.uid), (snap) => {
                            if (snap.exists()) setData(snap.data());
                        });
                    } else setUser(null);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (data?.squadId) return window.fb.onSnapshot(window.fb.doc(window.db, "squads", data.squadId), s => setSquad(s.data()));
            }, [data?.squadId]);

            useEffect(() => {
                if (tab === "ranking") {
                    const q = window.fb.query(window.fb.collection(window.db, "users"), window.fb.orderBy("pts", "desc"), window.fb.limit(25));
                    return window.fb.onSnapshot(q, s => setLeaderboard(s.docs.map(d => d.data())));
                }
                if (tab === "social") {
                    const q = window.fb.query(window.fb.collection(window.db, "feed"), window.fb.orderBy("time", "desc"), window.fb.limit(30));
                    return window.fb.onSnapshot(q, s => setPosts(s.docs.map(d => d.data())));
                }
            }, [tab]);

            const getRankObj = useMemo(() => (pts) => [...BADGES].reverse().find(b => (pts || 0) >= b.min) || BADGES[0], []);
            const getRankData = useMemo(() => (pts) => {
                const p = pts || 0; let currentIdx = 0;
                for (let i = 0; i < BADGES.length; i++) if (p >= BADGES[i].min) currentIdx = i;
                const nextBadge = BADGES[currentIdx + 1];
                const prevBadge = BADGES[currentIdx];
                const req = nextBadge ? nextBadge.min : prevBadge.min;
                const name = nextBadge ? nextBadge.name : 'Max';
                let progress = 100;
                if (nextBadge) {
                    const range = nextBadge.min - prevBadge.min;
                    const gained = p - prevBadge.min;
                    progress = Math.min(100, Math.max(0, (gained / range) * 100));
                }
                return { currentBadge: prevBadge, nextReq: req, nextName: name, progress };
            }, []);

            const isLocked = useCallback(() => data?.lockDate && (Date.now() - new Date(data.lockDate).getTime() < 7 * 86400000), [data?.lockDate]);
            const level = useMemo(() => Math.floor((data?.pts || 0) / 100) + 1, [data?.pts]);

            const currentStreak = useMemo(() => {
                const history = data?.history || [];
                if (history.length === 0) return 0;
                let s = 0, checkDate = new Date();
                const todayStr = checkDate.toISOString().slice(0, 10);
                checkDate.setDate(checkDate.getDate() - 1);
                const yestStr = checkDate.toISOString().slice(0, 10);
                if (!history.includes(todayStr) && !history.includes(yestStr)) return 0;
                checkDate = new Date();
                if (!history.includes(todayStr)) checkDate.setDate(checkDate.getDate() - 1);
                for (let i = 0; i < 365; i++) {
                    const ds = checkDate.toISOString().slice(0, 10);
                    if (history.includes(ds)) s++; else break;
                    checkDate.setDate(checkDate.getDate() - 1);
                }
                return s;
            }, [data?.history]);

            const totalActiveDays = useMemo(() => (data?.history || []).length, [data?.history]);

            const renderCalendar = useMemo(() => (historyArr = [], mode) => {
                const safeHistory = historyArr || [];
                const now = new Date();
                const nodes = [];
                const daysOfWeek = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];

                if (mode === "month") {
                    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
                    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                    
                    daysOfWeek.forEach(d => nodes.push(<div key={d+Math.random()} className="day-label">{d}</div>));
                    for (let i = 0; i < firstDay; i++) nodes.push(<div key={`empty-${i}`} className="day-node dim" />);
                    for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        nodes.push(<div key={d} className={`day-node ${safeHistory.includes(dateStr) ? 'active' : ''}`}>{d}</div>);
                    }
                } else {
                    const joinDate = new Date(data?.joinDate || "2026-04-12");
                    const daysToScroll = mode === "3m" ? 90 : mode === "6m" ? 180 : mode === "1y" ? 365 : 
                        Math.ceil((Date.now() - joinDate.getTime()) / 86400000) + 1;
                    for (let i = daysToScroll - 1; i >= 0; i--) {
                        const target = new Date(joinDate);
                        target.setDate(joinDate.getDate() + (daysToScroll - 1 - i));
                        const ds = target.toISOString().slice(0, 10);
                        nodes.push(<div key={ds} className={`day-node ${safeHistory.includes(ds) ? 'active' : ''}`} />);
                    }
                }
                return nodes;
            }, [data?.joinDate, data?.history]);

            const handleAction = useCallback(async () => {
                play('success');
                const today = new Date().toISOString().slice(0, 10);
                let update = { pts: (data?.pts || 0) + 10 };
                const safeLists = data?.lists || [];
                if (confirm.type === "personal") {
                    update.lists = safeLists.map(l => l.id === confirm.lid ? {...l, tasks: l.tasks.map(t => t.id === confirm.tid ? {...t, done: true} : t)} : l);
                } else update.sqLastDone = today;
                let hist = data?.history || []; 
                if (!hist.includes(today)) hist.push(today);
                update.history = hist;
                await window.fb.updateDoc(window.fb.doc(window.db, "users", user.uid), update);
                await window.fb.addDoc(window.fb.collection(window.db, "feed"), { name: data?.name || 'Agent', dcId: data?.dcId || 'ID', text: `Protocol Cleared: ${confirm.text}`, time: window.fb.serverTimestamp() });
                setConfirm(null);
                confetti({ particleCount: 320, spread: 100, origin: { y: 0.48 }, colors: ['#e2b871', '#ffffff', '#a855f7', '#2ecc71'] });
            }, [confirm, data, user, play]);

            const quickBoost = useCallback(async () => {
                play('success');
                await window.fb.updateDoc(window.fb.doc(window.db, "users", user.uid), { pts: (data?.pts || 0) + 5 });
                confetti({ particleCount: 140, spread: 65, origin: { y: 0.75 }, colors: ['#e2b871'] });
            }, [data?.pts, user, play]);

            const closeVault = useCallback(() => { play('click'); setViewVault(false); }, [play]);

            if (user && !data) return (
                <div className="container animate" style={{justifyContent:'center', minHeight:'100vh', alignItems:'center'}}>
                    <div className="rank-pulse" style={{fontSize: 60}}>⚡</div>
                    <p style={{marginTop: 32, color:'var(--gold)', letterSpacing: 7, fontSize: 12.5, fontWeight: 800}}>SYNCING WITH THE VAULT...</p>
                </div>
            );

            if (!user) return (
                <div className="container animate" style={{justifyContent:'center', minHeight:'100vh', paddingBottom: 20}}>
                    <div className="brand-header" style={{display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: '45px'}}>
                        <PremiumLogo size={75} />
                        <h1 style={{fontSize: 'clamp(44px, 13vw, 56px)', marginTop: '15px'}}>Dincharryaa</h1>
                    </div>
                    <div className="glass" style={{maxWidth: 440, margin: '0 auto'}}>
                        <div style={{display:'flex', background:'rgba(0,0,0,0.45)', borderRadius:30, padding:8, marginBottom:28}}>
                            <div onClick={() => setAuthTab("signin")} className={`flex-1 text-center py-4 rounded-3xl font-bold transition-all cursor-pointer ${authTab === "signin" ? "bg-white text-black shadow-inner" : "text-white/70"}`}>Sign In</div>
                            <div onClick={() => setAuthTab("signup")} className={`flex-1 text-center py-4 rounded-3xl font-bold transition-all cursor-pointer ${authTab === "signup" ? "bg-white text-black shadow-inner" : "text-white/70"}`}>New Agent</div>
                        </div>
                        <form onSubmit={async (e) => {
                            e.preventDefault(); play('click');
                            const em = e.target.email.value; const pw = e.target.password.value; const nm = authTab === "signup" ? e.target.username?.value : null;
                            try {
                                if (authTab === "signup" && nm) {
                                    const res = await window.fb.createUserWithEmailAndPassword(window.auth, em, pw);
                                    await window.fb.setDoc(window.fb.doc(window.db, "users", res.user.uid), { name: nm, dcId: "DC-"+Math.floor(1000+Math.random()*9000), pts: 0, lists: [], history: [], lockDate: null, joinDate: new Date().toISOString(), squadId: null });
                                } else await window.fb.signInWithEmailAndPassword(window.auth, em, pw);
                            } catch(err) { alert(err.message); }
                        }}>
                            {authTab === "signup" && <input name="username" placeholder="Full Name" required />}
                            <input name="email" type="email" placeholder="Access ID (Email)" required />
                            <input name="password" type="password" placeholder="Passcode" required />
                            <button className="btn-prime btn-gold" type="submit" style={{marginTop: 24, padding: 28, fontSize: 16}}>{authTab === "signup" ? 'INITIALIZE LINK' : 'ENTER THE VAULT'}</button>
                        </form>
                    </div>
                </div>
            );

            const safeData = data || {};
            const rankData = getRankData(safeData.pts || 0);
            const safeLists = safeData.lists || [];
            const safeHistory = safeData.history || [];
            const dailyQuote = MOTIVATIONAL_QUOTES[Math.floor(Date.now() / 86400000) % MOTIVATIONAL_QUOTES.length];
            const joinDisplay = safeData.joinDate ? new Date(safeData.joinDate).toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'}) : 'April 12, 2026';

            return (
                <div className="container">
                    <div className="brand-header" style={{display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '18px', marginBottom: '40px'}}>
                        <PremiumLogo size={48} />
                        <div style={{display: 'flex', flexDirection: 'column', alignItems: 'flex-start'}}>

                                    <div key={b.name} style={{display:'flex', gap: 28, padding: '24px', background: 'rgba(0,0,0,0.65)', borderRadius: 26, marginBottom: 18, border: '1px solid rgba(255,255,255,0.12)', opacity: (safeData?.pts||0) >= b.min ? 1 : 0.45, transition:'0.6s cubic-bezier(0.23, 1, 0.32, 1)', animationDelay: `${index * 60}ms`}}>
                                        <span style={{fontSize: 46}}>{b.icon}</span>
                                        <div style={{flex: 1, display:'flex', flexDirection:'column', justifyContent:'center'}}>
                                            <b style={{fontSize: 18, color: b.color, letterSpacing: 0.8}}>{b.name}</b>
                                            <p style={{fontSize: 12.5, color:'var(--text-muted)', fontWeight: 800, marginTop: 6}}>{b.min} XP REQ</p>
                                        </div>
                                        <div style={{display:'flex', alignItems:'center', fontSize: 14, fontWeight: 800, color: (safeData?.pts||0) >= b.min ? '#2ecc71' : 'var(--text-muted)'}}>
                                            {(safeData?.pts||0) >= b.min ? 'UNLOCKED ✓' : `${b.min - (safeData?.pts||0)} LEFT`}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Inspected User Modal */}
                    {inspectedUser && (
                        <div className="modal animate" onClick={(e) => { if (e.target.classList.contains('modal')) { play('click'); setInspectedUser(null); } }}>
                            <div className="modal-content glass" onClick={e => e.stopImmediatePropagation()} style={{maxWidth: 460, textAlign:'center', padding:'56px 38px'}}>
                                <div style={{fontSize: 82, marginBottom: 30}}>{getRankObj(inspectedUser.pts).icon}</div>
                                <h3 style={{fontFamily: 'Playfair Display', fontSize: 38, color: 'var(--gold)'}}>{inspectedUser.name}</h3>
                                <p style={{color: 'var(--purple)', fontSize: 17, fontWeight: 800, marginTop: 14, letterSpacing: 2.5}}>{inspectedUser.pts} XP</p>
                                <div style={{height: 1, background: 'rgba(255,255,255,0.1)', margin: '38px 0'}}></div>
                                <p style={{fontSize: 12.5, fontWeight: 800, color: 'var(--text-muted)', marginBottom: 26, letterSpacing: 3}}>RECENT ACTIVITY</p>
                                <div className="cal-grid" style={{justifyContent:'center'}}>
                                    {renderCalendar(inspectedUser.history, 'month')}
                                </div>
                                <button className="btn-prime" style={{marginTop: 44, padding: 24, background:'rgba(0,0,0,0.75)', color:'var(--text-muted)', border:'2px solid rgba(255,255,255,0.2)'}} onClick={() => { play('click'); setInspectedUser(null); }}>CLOSE TERMINAL</button>
                            </div>
                        </div>
                    )}

                    {/* Confirm Modal */}
                    {confirm && (
                        <div className="modal animate" onClick={(e) => { if (e.target.classList.contains('modal')) { play('click'); setConfirm(null); } }}>
                            <div className="modal-content glass" onClick={e => e.stopImmediatePropagation()} style={{maxWidth: 440, textAlign:'center', padding: '50px 38px'}}>
                                <div style={{fontSize: 56, marginBottom: 30}}>⚡</div>
                                <h3 style={{lineHeight: 1.55, fontSize: 24, fontWeight: 600}}>{confirm.text}</h3>
                                <p style={{fontSize: 13.5, color:'var(--text-muted)', marginTop: 20, fontWeight:500}}>Confirm completion to broadcast to network.</p>
                                <div style={{display:'flex', gap: 20, marginTop: 48}}>
                                    <button className="btn-prime" style={{background:'rgba(0,0,0,0.75)', border:'2px solid rgba(255,255,255,0.2)', color:'var(--text-muted)'}} onClick={() => { play('click'); setConfirm(null); }}>CANCEL</button>
                                    <button className="btn-prime btn-gold" onClick={handleAction}>CONFIRM</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
